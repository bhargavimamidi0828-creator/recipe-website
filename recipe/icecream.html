<h1>Ice Cream</h1>

<h2>Ingredients</h2>
<ul>
<li>Milk</li>
<li>Sugar</li>
<li>Cream</li>
<li>Vanilla essence</li>
</ul>

<h2>Steps</h2>
<ol>
<li>Mix milk and sugar.</li>
<li>Add cream.</li>
<li>Add vanilla.</li>
<li>Freeze for 6 hours.</li>
</ol>
