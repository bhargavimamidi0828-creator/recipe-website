<h1>Dosa</h1>

<h2>Ingredients</h2>
<ul>
<li>2 cups rice</li>
<li>1 cup urad dal</li>
<li>Salt</li>
<li>Oil</li>
</ul>

<h2>Steps</h2>
<ol>
<li>Soak rice and dal for 6 hours.</li>
<li>Grind to smooth batter.</li>
<li>Ferment overnight.</li>
<li>Spread batter on hot pan.</li>
<li>Cook until crispy.</li>
</ol>
